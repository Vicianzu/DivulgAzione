<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Meccanica Quantistica — Introduzione</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#000010; color:#e2e8f0; font-family:'Georgia',serif; overflow:hidden; }
#canvas { display:block; }

#ui {
  position:fixed; top:0; left:0; right:0;
  display:flex; justify-content:space-between; align-items:center;
  padding:11px 22px;
  background:rgba(0,0,16,0.92);
  border-bottom:1px solid #1e293b;
  z-index:100; gap:12px;
}
#title    { font-size:13px; color:#38bdf8; letter-spacing:3px; text-transform:uppercase; white-space:nowrap; }
#phase-desc { font-size:11.5px; color:#94a3b8; text-align:center; line-height:1.5; max-width:560px; }
#phase-name { font-size:14px; color:#7dd3fc; font-weight:bold; text-align:right; white-space:nowrap; }

#bottom {
  position:fixed; bottom:0; left:0; right:0;
  padding:9px 20px;
  background:rgba(0,0,16,0.92);
  border-top:1px solid #1e293b;
  display:flex; justify-content:center; gap:8px; z-index:100; flex-wrap:wrap;
}
.btn {
  padding:6px 14px; border:1px solid #1e3a5f;
  background:#0c1a2e; color:#7dd3fc;
  border-radius:20px; cursor:pointer; font-size:11px; transition:all 0.3s;
}
.btn:hover, .btn.active { background:#0c4a6e; border-color:#38bdf8; color:#e0f2fe; }

#panel {
  position:fixed; right:14px; top:66px;
  width:200px;
  background:rgba(8,14,30,0.94);
  border:1px solid #1e3a5f; border-radius:10px;
  padding:13px; font-size:11px; color:#64748b;
  line-height:1.7; z-index:100;
}
#panel h3 { color:#38bdf8; font-size:12px; margin-bottom:8px;
  border-bottom:1px solid #1e293b; padding-bottom:5px; letter-spacing:1px; }
.pr { display:flex; justify-content:space-between; margin-bottom:3px; }
.pv { color:#e2e8f0; font-weight:bold; }
.leg { display:flex; align-items:center; gap:7px; margin-bottom:5px; }
.ld  { width:18px; height:3px; border-radius:2px; }
</style>
</head>
<body>
<div id="ui">
  <div id="title">QM — Quantistica</div>
  <div id="phase-desc">—</div>
  <div id="phase-name">—</div>
</div>
<canvas id="canvas"></canvas>
<div id="panel">
  <h3>GLOSSARIO QM</h3>
  <div class="pr"><span>Fase:</span><span class="pv" id="s-phase">1/10</span></div>
  <hr style="border-color:#1e293b;margin:8px 0;">
  <div class="pr"><span>ψ:</span><span class="pv">funzione d'onda</span></div>
  <div class="pr"><span>|ψ|²:</span><span class="pv">probabilità</span></div>
  <div class="pr"><span>ℏ:</span><span class="pv">costante ridotta</span></div>
  <div class="pr"><span>Spin:</span><span class="pv">mom. angolare</span></div>
  <div class="pr"><span>QCD:</span><span class="pv">cromodinamica</span></div>
  <div class="pr"><span>QED:</span><span class="pv">elettrodinamica</span></div>
  <div class="pr"><span>α ≈ 1/137</span><span class="pv">cost. fine</span></div>
  <div class="pr"><span>Higgs:</span><span class="pv">125.09 GeV</span></div>
  <hr style="border-color:#1e293b;margin:8px 0;">
  <div style="font-size:10px;color:#334155;line-height:1.5;">
    Planck 1900<br>
    Einstein 1905<br>
    Heisenberg 1925<br>
    Schrödinger 1926<br>
    Dirac 1927<br>
    Higgs 1964 → LHC 2012
  </div>
</div>
<div id="bottom">
  <button class="btn active" onclick="go(0)">① Crisi classica</button>
  <button class="btn" onclick="go(1)">② Funzione d'onda</button>
  <button class="btn" onclick="go(2)">③ Indeterminazione</button>
  <button class="btn" onclick="go(3)">④ Doppia fenditura</button>
  <button class="btn" onclick="go(4)">⑤ Spin</button>
  <button class="btn" onclick="go(5)">⑥ Modello Standard</button>
  <button class="btn" onclick="go(6)">⑦ QCD Colori</button>
  <button class="btn" onclick="go(7)">⑧ Entanglement</button>
  <button class="btn" onclick="go(8)">⑨ QED Feynman</button>
  <button class="btn" onclick="go(9)">⑩ Bosone di Higgs</button>
  <button class="btn" id="pauseBtn" onclick="togglePause()">⏸ Pausa</button>
</div>

<script>
const cv=document.getElementById('canvas');
const cx=cv.getContext('2d');
let W,H;
function resize(){W=cv.width=window.innerWidth;H=cv.height=window.innerHeight;}
resize(); window.addEventListener('resize',resize);

let ph=0, T=0, pT=0, paused=false;

const PHASES=[
  { name:"① La Crisi della Fisica Classica",
    desc:"La fisica classica non riusciva a spiegare lo spettro del corpo nero, l'effetto fotoelettrico e la stabilità atomica. Planck, Einstein e Bohr aprirono la via alla rivoluzione quantistica." },
  { name:"② La Funzione d'Onda e la Sovrapposizione",
    desc:"La funzione d'onda ψ descrive completamente lo stato di un sistema quantistico. Il suo modulo quadro |ψ|² rappresenta la probabilità di misura. Prima della misura, il sistema è in sovrapposizione." },
  { name:"③ Il Principio di Indeterminazione",
    desc:"Heisenberg: Δx·Δp ≥ ℏ/2. Non è un limite tecnologico ma una proprietà fondamentale della natura. Più precisa è la posizione, più indeterminato è il momento — e viceversa." },
  { name:"④ La Dualità Onda-Corpuscolo",
    desc:"Ogni particella è anche un'onda. L'esperimento della doppia fenditura mostra che un singolo elettrone interferisce con se stesso — finché non viene osservato. La misura distrugge l'interferenza." },
  { name:"⑤ Lo Spin — Momento Angolare Intrinseco",
    desc:"Lo spin è una proprietà quantistica senza analogo classico. L'esperimento di Stern-Gerlach dimostrò che il momento angolare è quantizzato: i fermioni (spin 1/2) obbediscono al principio di Pauli." },
  { name:"⑥ Il Modello Standard",
    desc:"Il Modello Standard descrive 17 particelle fondamentali e 3 delle 4 forze della natura (elettromagnetica, debole, forte). È la teoria più precisa e verificata della fisica moderna." },
  { name:"⑦ I Colori dei Quark — QCD",
    desc:"La Cromodinamica Quantistica descrive la forza forte tramite la carica di colore (rosso, verde, blu). I quark sono sempre confinati in adroni — il confinamento è uno dei grandi misteri irrisolti." },
  { name:"⑧ L'Entanglement Quantistico",
    desc:"Due particelle quantisticamente entangled condividono uno stato globale non separabile. La misura su una determina istantaneamente lo stato dell'altra — 'azione fantasma a distanza' (Einstein). Bell dimostrò che la natura è davvero non-locale." },
  { name:"⑨ L'Elettrodinamica Quantistica — QED",
    desc:"La QED descrive le interazioni elettromagnetiche tramite scambio di fotoni virtuali. Con la costante di struttura fine α ≈ 1/137, è la teoria più precisa mai costruita: accordo a 12 cifre decimali." },
  { name:"⑩ Il Bosone di Higgs",
    desc:"Il meccanismo di Higgs spiega perché le particelle hanno massa. Il campo di Higgs permea tutto lo spazio; il bosone fu scoperto al CERN-LHC il 4 luglio 2012 a 125.09 GeV — completando il Modello Standard." }
];

function go(n){
  ph=n; pT=0;
  document.querySelectorAll('.btn').forEach((b,i)=>b.classList.toggle('active',i===n));
  document.getElementById('s-phase').textContent=(n+1)+'/10';
  updateUI();
}
function updateUI(){
  document.getElementById('phase-desc').textContent=PHASES[ph].desc;
  document.getElementById('phase-name').textContent=PHASES[ph].name;
}
function togglePause(){
  paused=!paused;
  document.getElementById('pauseBtn').textContent=paused?'▶ Riprendi':'⏸ Pausa';
}

// ── helpers ────────────────────────────────────────────────
function lbl(x,y,txt,col,sz,al='center',bold=false){
  cx.fillStyle=col;
  cx.font=`${bold?'bold ':''}${sz}px Georgia,serif`;
  cx.textAlign=al; cx.fillText(txt,x,y);
}
function glow(c,b){cx.shadowColor=c;cx.shadowBlur=b;}
function ng(){cx.shadowBlur=0;}

let _stars=null;
function stars(){
  if(!_stars)_stars=Array.from({length:180},()=>({
    x:Math.random()*3000,y:Math.random()*2000,
    r:Math.random()*1.3+0.2,o:Math.random()*0.4+0.1
  }));
  _stars.forEach(s=>{
    cx.beginPath();cx.arc(s.x,s.y,s.r,0,Math.PI*2);
    cx.fillStyle=`rgba(255,255,255,${s.o*(0.5+0.5*Math.sin(T*0.3+s.x*0.01))})`;
    cx.fill();
  });
}

function bg(){
  const g=cx.createRadialGradient(W/2,H/2,80,W/2,H/2,Math.max(W,H)*0.9);
  g.addColorStop(0,'#020920');g.addColorStop(1,'#000010');
  cx.fillStyle=g;cx.fillRect(0,0,W,H);
}

// ── FASE 0: La Crisi della Fisica Classica ────────────────
function ph0(){
  const events=[
    {yr:1900,name:'Max Planck',form:'E = hν',col:'#f59e0b'},
    {yr:1905,name:'Einstein',form:'fotone — effetto fotoelettrico',col:'#f59e0b'},
    {yr:1913,name:'Bohr',form:'modello atomico quantizzato',col:'#f59e0b'},
    {yr:1924,name:'de Broglie',form:'λ = h/p',col:'#f59e0b'},
    {yr:1925,name:'Heisenberg',form:'meccanica a matrici',col:'#f59e0b'},
    {yr:1926,name:'Schrödinger',form:'equazione d\'onda iℏ∂ψ/∂t = Ĥψ',col:'#a78bfa'},
    {yr:1927,name:'Dirac',form:'equazione relativistica',col:'#f59e0b'},
    {yr:1927,name:'Heisenberg',form:'Δx · Δp ≥ ℏ/2',col:'#38bdf8'},
  ];

  const tlX0=W*0.1, tlX1=W*0.88-220;
  const tlY=H*0.56;

  // asse temporale
  cx.beginPath();cx.moveTo(tlX0,tlY);cx.lineTo(tlX1,tlY);
  cx.strokeStyle='rgba(148,163,184,0.35)';cx.lineWidth=2;cx.stroke();
  // freccia
  cx.beginPath();cx.moveTo(tlX1-10,tlY-6);cx.lineTo(tlX1+2,tlY);cx.lineTo(tlX1-10,tlY+6);
  cx.fillStyle='rgba(148,163,184,0.35)';cx.fill();

  const nShow=Math.min(events.length, Math.floor(pT/52)+1);
  events.forEach((ev,i)=>{
    const frac=i/(events.length-1);
    const ex=tlX0+frac*(tlX1-tlX0-20);
    const appear=Math.min(1,(pT-i*52)/40);
    if(appear<=0)return;
    const upY=tlY-(80+i%2*60)*appear;

    // linea verticale
    cx.beginPath();cx.moveTo(ex,tlY);cx.lineTo(ex,upY);
    cx.strokeStyle=`rgba(245,158,11,${0.5*appear})`;cx.lineWidth=1;
    cx.setLineDash([3,4]);cx.stroke();cx.setLineDash([]);

    // punto
    cx.beginPath();cx.arc(ex,tlY,5,0,Math.PI*2);
    cx.fillStyle=ev.col;glow(ev.col,12*appear);cx.fill();ng();

    cx.globalAlpha=appear;
    lbl(ex,upY-32,ev.yr.toString(),'#fde68a',12,'center',true);
    lbl(ex,upY-16,ev.name,'#f59e0b',11,'center',true);
    lbl(ex,upY,ev.form,ev.col,10,'center');
    cx.globalAlpha=1;
  });

  lbl(W*0.5,H*0.11,'La Crisi della Fisica Classica','#f1f5f9',20,'center',true);
  lbl(W*0.5,H*0.11+26,'Il corpo nero, l\'effetto fotoelettrico, gli spettri atomici — la fisica classica era incompiuta','#64748b',12);

  // box corpo nero a destra
  const bx=W*0.88-200, by=H*0.15;
  cx.fillStyle='rgba(8,14,30,0.9)';
  cx.beginPath();cx.roundRect(bx,by,200,H*0.35,8);cx.fill();
  cx.strokeStyle='#1e3a5f';cx.lineWidth=1;cx.stroke();
  lbl(bx+100,by+18,'Corpo Nero','#f59e0b',12,'center',true);
  // curva Planck
  cx.beginPath();
  for(let k=0;k<=80;k++){
    const nu=k/80;
    const v=nu*nu*nu/(Math.exp(3*nu/(0.3+0.1*Math.sin(T*0.2)))-1+0.001);
    const px2=bx+12+nu*176, py2=by+105-v*60;
    k===0?cx.moveTo(px2,py2):cx.lineTo(px2,py2);
  }
  cx.strokeStyle='#a78bfa';cx.lineWidth=2;glow('#a78bfa',6);cx.stroke();ng();
  // curva classica (UV catastrophe)
  cx.beginPath();
  for(let k=1;k<=80;k++){
    const nu=k/80;
    const v=nu*nu*0.8;
    const px2=bx+12+nu*176, py2=by+105-Math.min(v*60,90);
    k===1?cx.moveTo(px2,py2):cx.lineTo(px2,py2);
  }
  cx.strokeStyle='rgba(239,68,68,0.7)';cx.lineWidth=1.5;cx.setLineDash([5,4]);cx.stroke();cx.setLineDash([]);
  lbl(bx+100,by+120,'Planck (viola) vs Classica (rosso)','#64748b',9,'center');
  lbl(bx+100,by+136,'La classica diverge in UV!','#ef4444',9,'center');
  lbl(bx+100,by+154,'ρ(ν,T) = 8πhν³/c³ · 1/(e^{hν/kT}−1)','#fde68a',8.5,'center');
}

// ── FASE 1: La Funzione d'Onda ────────────────────────────
let _collapsed=false, _collapseX=0, _collapseFlash=0;
function ph1(){
  if(pT===1){_collapsed=false;_collapseFlash=0;}
  const cx0=W*0.5, cy0=H*0.48;
  const sigma=W*0.12;
  const k0=0.08, omega=0.06;
  const packetX=cx0+W*0.18*Math.sin(T*0.25);

  lbl(W*0.5,H*0.1,'La Funzione d\'Onda e la Sovrapposizione','#f1f5f9',20,'center',true);
  lbl(W*0.5,H*0.1+26,'iℏ ∂ψ/∂t = Ĥψ  —  Equazione di Schrödinger','#a78bfa',14,'center',true);
  lbl(W*0.5,H*0.1+44,'La funzione d\'onda contiene tutta l\'informazione del sistema','#64748b',11);

  if(pT>300&&!_collapsed){
    _collapsed=true;
    _collapseX=packetX+W*0.04*(Math.random()-0.5)*2;
    _collapseFlash=20;
  }

  if(_collapseFlash>0){
    cx.fillStyle=`rgba(255,255,255,${_collapseFlash/20*0.4})`;
    cx.fillRect(0,0,W,H);
    _collapseFlash--;
  }

  // draw |ψ|² probability fill
  const probY=cy0+H*0.12;
  cx.beginPath();cx.moveTo(W*0.08,probY);
  for(let i=0;i<=400;i++){
    const x=W*0.08+i*(W*0.84)/400;
    const dx=x-(_collapsed?_collapseX:packetX);
    const sig=_collapsed?W*0.012:sigma;
    const env=Math.exp(-dx*dx/(2*sig*sig));
    const psi2=env*env;
    const py=probY-psi2*H*0.14;
    i===0?cx.moveTo(x,py):cx.lineTo(x,py);
  }
  cx.lineTo(W*0.92,probY);
  cx.fillStyle='rgba(167,139,250,0.18)';cx.fill();
  cx.strokeStyle='rgba(167,139,250,0.4)';cx.lineWidth=1;cx.stroke();
  lbl(W*0.5,probY+18,'|ψ|² — densità di probabilità','#a78bfa',11);

  // draw ψ wave packet
  cx.beginPath();
  for(let i=0;i<=500;i++){
    const x=W*0.08+i*(W*0.84)/500;
    const dx=x-(_collapsed?_collapseX:packetX);
    const sig=_collapsed?W*0.012:sigma;
    const env=Math.exp(-dx*dx/(2*sig*sig));
    const phase=k0*(x-cx0)-omega*T*(_collapsed?0:1);
    const psi=env*Math.sin(phase)*H*0.11;
    const py=cy0+psi;
    i===0?cx.moveTo(x,py):cx.lineTo(x,py);
  }
  cx.strokeStyle='#a78bfa';cx.lineWidth=2;glow('#a78bfa',10);cx.stroke();ng();
  lbl(W*0.5,cy0-H*0.14,'ψ(x,t) — funzione d\'onda','#c4b5fd',11);

  // baseline
  cx.beginPath();cx.moveTo(W*0.08,cy0);cx.lineTo(W*0.92,cy0);
  cx.strokeStyle='rgba(148,163,184,0.2)';cx.lineWidth=1;cx.stroke();

  // superposition: two waves
  if(!_collapsed){
    const cy2=H*0.81;
    cx.beginPath();
    for(let i=0;i<=500;i++){
      const x=W*0.08+i*(W*0.84)/500;
      const dx1=x-(cx0-W*0.15);const dx2=x-(cx0+W*0.15);
      const sig2=W*0.09;
      const e1=Math.exp(-dx1*dx1/(2*sig2*sig2));
      const e2=Math.exp(-dx2*dx2/(2*sig2*sig2));
      const psi=(e1*Math.sin(k0*(x-cx0+W*0.15)-omega*T)*0.5+
                 e2*Math.sin(k0*(x-cx0-W*0.15)*1.4-omega*T*1.2)*0.5)*H*0.07;
      i===0?cx.moveTo(x,cy2+psi):cx.lineTo(x,cy2+psi);
    }
    cx.strokeStyle='#60a5fa';cx.lineWidth=1.5;glow('#60a5fa',6);cx.stroke();ng();
    cx.beginPath();
    for(let i=0;i<=500;i++){
      const x=W*0.08+i*(W*0.84)/500;
      const dx2=x-(cx0+W*0.15);const sig2=W*0.09;
      const e2=Math.exp(-dx2*dx2/(2*sig2*sig2));
      const psi=e2*Math.sin(k0*(x-cx0-W*0.15)*1.4-omega*T*1.2)*H*0.06;
      i===0?cx.moveTo(x,cy2+psi):cx.lineTo(x,cy2+psi);
    }
    cx.strokeStyle='#f59e0b';cx.lineWidth=1.2;glow('#f59e0b',5);cx.stroke();ng();
    cx.beginPath();cx.moveTo(W*0.08,cy2);cx.lineTo(W*0.92,cy2);
    cx.strokeStyle='rgba(148,163,184,0.15)';cx.lineWidth=1;cx.stroke();
    lbl(W*0.5,cy2-H*0.1,'Sovrapposizione: ψ = α|0⟩ + β|1⟩','#60a5fa',12,'center',true);
    lbl(W*0.5,cy2+20,'Blu + Arancio = stato sovrapposto (azzurro)','#64748b',10);
  } else {
    lbl(W*0.5,H*0.78,'COLLASSO DELLA FUNZIONE D\'ONDA','#ef4444',14,'center',true);
    glow('#ef4444',15);
    lbl(W*0.5,H*0.82,'La misura ha localizzato la particella!','#94a3b8',11);
    ng();
  }

  if(pT<310) lbl(W*0.5,H*0.92,'La particella viaggia come onda... alla misura il collasso avviene...','#475569',10);
}

// ── FASE 2: Il Principio di Indeterminazione ──────────────
function ph2(){
  lbl(W*0.5,H*0.1,'Il Principio di Indeterminazione di Heisenberg','#f1f5f9',20,'center',true);

  // formula centrale
  cx.fillStyle='rgba(8,14,30,0.9)';
  cx.beginPath();cx.roundRect(W*0.5-180,H*0.16,360,56,8);cx.fill();
  cx.strokeStyle='#38bdf8';cx.lineWidth=1.5;cx.stroke();
  lbl(W*0.5,H*0.16+22,'Δx · Δp ≥ ℏ/2','#38bdf8',20,'center',true);
  lbl(W*0.5,H*0.16+44,'ΔE · Δt ≥ ℏ/2','#60a5fa',14,'center');

  // split screen
  const lx=W*0.22, rx=W*0.72, wY=H*0.52;

  // LEFT: narrow packet (small Δx, large Δp)
  lbl(lx,H*0.27,'Δx piccolo → Δp grande','#ef4444',12,'center',true);
  const sigL=W*0.03;
  cx.beginPath();
  for(let i=0;i<=300;i++){
    const x=W*0.05+i*(W*0.38)/300;
    const dx=x-lx;
    const env=Math.exp(-dx*dx/(2*sigL*sigL));
    const psi=env*Math.sin(0.18*(x-lx)-T*3)*H*0.1;
    i===0?cx.moveTo(x,wY+psi):cx.lineTo(x,wY+psi);
  }
  cx.strokeStyle='#38bdf8';cx.lineWidth=2;glow('#38bdf8',8);cx.stroke();ng();
  // span indicator Δx
  const dxL=sigL*2;
  cx.beginPath();cx.moveTo(lx-dxL,wY+H*0.14);cx.lineTo(lx+dxL,wY+H*0.14);
  cx.strokeStyle='#38bdf8';cx.lineWidth=1.5;
  cx.setLineDash([4,3]);cx.stroke();cx.setLineDash([]);
  lbl(lx,wY+H*0.18,'Δx','#38bdf8',11,'center',true);
  // freq components: many
  for(let f=0;f<9;f++){
    const fy=wY+H*0.26+f*14;
    const amp=Math.exp(-Math.pow(f-4,2)/3);
    cx.beginPath();cx.moveTo(W*0.05,fy);cx.lineTo(W*0.05+amp*W*0.36,fy);
    cx.strokeStyle=`rgba(249,115,22,${0.4+amp*0.5})`;cx.lineWidth=2;cx.stroke();
    lbl(W*0.05+amp*W*0.36+6,fy+4,`k${f+1}`,'#f97316',8,'left');
  }
  lbl(lx,wY+H*0.4,'Molte componenti di frequenza','#f97316',10,'center');
  lbl(lx,wY+H*0.44,'(Δp grande)','#f97316',10,'center');

  // RIGHT: wide packet (large Δx, small Δp)
  lbl(rx,H*0.27,'Δx grande → Δp piccolo','#4ade80',12,'center',true);
  const sigR=W*0.12;
  cx.beginPath();
  for(let i=0;i<=300;i++){
    const x=W*0.55+i*(W*0.38)/300;
    const dx=x-rx;
    const env=Math.exp(-dx*dx/(2*sigR*sigR));
    const psi=env*Math.sin(0.04*(x-rx)-T*1.2)*H*0.1;
    i===0?cx.moveTo(x,wY+psi):cx.lineTo(x,wY+psi);
  }
  cx.strokeStyle='#4ade80';cx.lineWidth=2;glow('#4ade80',8);cx.stroke();ng();
  const dxR=sigR*0.9;
  cx.beginPath();cx.moveTo(rx-dxR,wY+H*0.14);cx.lineTo(rx+dxR,wY+H*0.14);
  cx.strokeStyle='#4ade80';cx.lineWidth=1.5;cx.setLineDash([4,3]);cx.stroke();cx.setLineDash([]);

    cx.strokeStyle=`rgba(74,222,128,${0.4+amp*0.5})`;cx.lineWidth=3;cx.stroke();
    lbl(W*0.55+amp*W*0.36+6,fy+4,`k${f+1}`,'#4ade80',8,'left');
  }
  lbl(rx,wY+H*0.42,'Poche componenti di frequenza','#4ade80',10,'center');

  // baselines
  cx.beginPath();cx.moveTo(W*0.05,wY);cx.lineTo(W*0.42,wY);
  cx.strokeStyle='rgba(148,163,184,0.2)';cx.lineWidth=1;cx.stroke();
  cx.beginPath();cx.moveTo(W*0.55,wY);cx.lineTo(W*0.92,wY);
  cx.strokeStyle='rgba(148,163,184,0.2)';cx.lineWidth=1;cx.stroke();

  lbl(W*0.5,H*0.91,'Non è un limite tecnologico — è una proprietà fondamentale della natura','#94a3b8',12,'center',true);
}

// ── FASE 3: Doppia Fenditura ──────────────────────────────
let _particles=[];
function ph3(){
  if(pT===1) _particles=[];

  const gunX=W*0.1, slitX=W*0.5, screenX=W*0.86;
  const slitY1=H*0.44, slitY2=H*0.56, slitGap=6;

  lbl(W*0.5,H*0.1,'La Dualità Onda-Corpuscolo','#f1f5f9',20,'center',true);
  lbl(W*0.5,H*0.1+26,'d · sinθ = mλ  —  la particella interferisce con se stessa','#38bdf8',13,'center',true);
  lbl(W*0.5,H*0.1+44,'Finché non la guardi','#64748b',11);

  // gun
  cx.fillStyle='rgba(56,189,248,0.2)';
  cx.beginPath();cx.roundRect(gunX-24,H*0.49,24,18,4);cx.fill();
  cx.strokeStyle='#38bdf8';cx.lineWidth=1;cx.stroke();
  lbl(gunX-12,H*0.55,'⚡','#38bdf8',11,'center');
  lbl(gunX,H*0.62,'Sorgente','#64748b',9,'center');

  // barrier
  cx.fillStyle='rgba(100,116,139,0.5)';
  cx.fillRect(slitX-4,H*0.18,8,H*0.6);
  // slits (cutouts)
  cx.fillStyle='#000010';
  cx.fillRect(slitX-5,slitY1-slitGap,10,slitGap*2);
  cx.fillRect(slitX-5,slitY2-slitGap,10,slitGap*2);
  lbl(slitX+14,slitY1,'Fenditura 1','#64748b',9,'left');
  lbl(slitX+14,slitY2,'Fenditura 2','#64748b',9,'left');

  // screen
  cx.fillStyle='rgba(30,58,95,0.4)';
  cx.fillRect(screenX,H*0.18,8,H*0.6);
  cx.strokeStyle='rgba(56,189,248,0.4)';cx.lineWidth=1;cx.stroke();

  // spawn new particle
  if(pT%15===0 && _particles.length<60){
    const targetY=H*0.5+H*0.3*interferenceY();
    _particles.push({x:gunX,y:H*0.5,tx:screenX,ty:targetY,prog:0,done:false,dy:targetY});
  }

  // draw interference pattern on screen (dots)
  _particles.forEach(p=>{
    if(!p.done){
      p.prog+=0.03;
      p.x=gunX+(slitX-gunX)*Math.min(p.prog,1);
      p.y=H*0.5+(p.ty-H*0.5)*Math.max(0,(p.prog-0.5)*2);
      if(p.prog>=1) p.done=true;
    }
    if(p.done){
      cx.beginPath();cx.arc(screenX+5,p.ty,2.5,0,Math.PI*2);
      cx.fillStyle='#4ade80';glow('#4ade80',6);cx.fill();ng();
    } else {
      cx.beginPath();cx.arc(p.x,p.y,3,0,Math.PI*2);
      cx.fillStyle='rgba(96,165,250,0.8)';cx.fill();
    }
  });

  // intensity curve overlay on screen
  if(_particles.filter(p=>p.done).length>10){
    cx.beginPath();
    for(let k=0;k<=100;k++){
      const yf=k/100;
      const screenY=H*0.18+yf*H*0.6;
      const dy=screenY-H*0.5;
      const theta=dy/(H*0.3)*Math.PI*2.5;
      const intensity=Math.pow(Math.cos(theta)*Math.exp(-theta*theta/18),2);
      const px2=screenX+8+intensity*30;
      k===0?cx.moveTo(px2,screenY):cx.lineTo(px2,screenY);
    }
    cx.strokeStyle='rgba(74,222,128,0.5)';cx.lineWidth=2;cx.stroke();
  }

  lbl(W*0.5,H*0.88,'La particella viaggia come onda attraverso entrambe le fenditure simultaneamente','#94a3b8',11,'center');
}
function interferenceY(){
  for(let attempt=0;attempt<200;attempt++){
    const theta=Math.random()*Math.PI*2-Math.PI;
    const intensity=Math.pow(Math.cos(theta*2),2)*Math.exp(-theta*theta/6);
    if(intensity>Math.random()) return theta/Math.PI;
  }
  return 0;
}

// ── FASE 4: Spin — Stern-Gerlach ──────────────────────────
function ph4(){
  const ox=W*0.5, srcX=W*0.1, detX=W*0.86;
  const my=H*0.52;

  lbl(W*0.5,H*0.1,'Lo Spin — Momento Angolare Intrinseco','#f1f5f9',20,'center',true);

  lbl(srcX,my+6,'Ag','#fde68a',13,'center',true);
  lbl(srcX,my+26,'forno','#64748b',9,'center');

  // magnet region
  const magX0=W*0.35, magX1=W*0.62;
  cx.fillStyle='rgba(56,189,248,0.07)';

  cx.strokeStyle='rgba(56,189,248,0.3)';cx.lineWidth=1;cx.stroke();

  for(let g=0;g<8;g++){
    const gy=my-H*0.18+g*(H*0.36/8);
    cx.beginPath();cx.moveTo(magX0+8,gy);cx.lineTo(magX1-8,gy);
    const alpha=0.08+0.12*(g/8);
    cx.strokeStyle=`rgba(56,189,248,${alpha})`;cx.lineWidth=1;
    cx.setLineDash([4,5]);cx.stroke();cx.setLineDash([]);

  lbl(magX1-6,my+H*0.12,'S','#ef4444',14,'right',true);

  // two beams
  const nAtoms=10;
  for(let i=0;i<nAtoms;i++){

    cx.fillStyle='#60a5fa';glow('#60a5fa',10);cx.fill();ng();
    // down beam
    const dnDefl=frac*H*0.18*(bx>magX0?1:0);
    cx.beginPath();cx.arc(bx,my+dnDefl,4,0,Math.PI*2);
    cx.fillStyle='#f97316';glow('#f97316',10);cx.fill();ng();
  }
  // beam trails
  cx.beginPath();cx.moveTo(srcX,my);cx.lineTo(magX0,my);
  cx.strokeStyle='rgba(148,163,184,0.3)';cx.lineWidth=1.5;cx.setLineDash([5,4]);cx.stroke();cx.setLineDash([]);
  cx.beginPath();cx.moveTo(magX0,my);cx.bezierCurveTo(ox,my,ox,my-H*0.18,detX,my-H*0.18);
  cx.strokeStyle='rgba(96,165,250,0.35)';cx.lineWidth=1.5;cx.setLineDash([5,4]);cx.stroke();cx.setLineDash([]);
  cx.beginPath();cx.moveTo(magX0,my);cx.bezierCurveTo(ox,my,ox,my+H*0.18,detX,my+H*0.18);
  cx.strokeStyle='rgba(249,115,22,0.35)';cx.lineWidth=1.5;cx.setLineDash([5,4]);cx.stroke();cx.setLineDash([]);

  // detectors
  cx.fillStyle='rgba(96,165,250,0.3)';cx.beginPath();cx.roundRect(detX,my-H*0.22,16,24,4);cx.fill();
  cx.fillStyle='rgba(249,115,22,0.3)';cx.beginPath();cx.roundRect(detX,my+H*0.14,16,24,4);cx.fill();
  lbl(detX+8,my-H*0.16,'↑','#60a5fa',18,'center',true);
  lbl(detX+8,my+H*0.18,'↓','#f97316',18,'center',true);

  // table
  const tx=W*0.06, ty=H*0.7;
  cx.fillStyle='rgba(8,14,30,0.9)';cx.beginPath();cx.roundRect(tx,ty,W*0.55,H*0.22,8);cx.fill();
  cx.strokeStyle='#1e3a5f';cx.lineWidth=1;cx.stroke();
  lbl(tx+W*0.275,ty+16,'Particella','#94a3b8',10,'center',true);
  lbl(tx+W*0.275,ty+30,'————————————————————————————','#1e3a5f',8,'center');
  const rows=[
    ['Spin 1/2','Elettrone, protone','Fermione','Principio di Pauli','#60a5fa'],
    ['Spin 1','Fotone, W±, Z⁰','Bosone','No Pauli','#4ade80'],
    ['Spin 2','Gravitone (teorico)','Bosone','No Pauli','#fde68a'],
  ];
  rows.forEach((r,i)=>{
    const ry=ty+46+i*26;
    lbl(tx+14,ry,r[0],r[4],10,'left',true);
    lbl(tx+W*0.17,ry,r[1],'#e2e8f0',9,'left');
    lbl(tx+W*0.34,ry,r[2],r[4],9,'left');
    lbl(tx+W*0.44,ry,r[3],'#64748b',9,'left');
  });
  lbl(W*0.5,H*0.93,'Lo spin è una proprietà quantistica senza analogo classico','#94a3b8',11,'center');
}

  lbl(W*0.5,H*0.09+24,'17 particelle fondamentali — 3 delle 4 forze della natura','#64748b',12);

  const particles=[
    // quarks gen 1
    {sym:'u',name:'up',spin:'2/3',col:'#ef4444',bk:'rgba(239,68,68,0.15)',row:1,col_idx:1},

// ── FASE 6: QCD — I Colori dei Quark ─────────────────────
function ph6(){
  lbl(W*0.5,H*0.09,'I Colori dei Quark — Cromodinamica Quantistica','#f1f5f9',20,'center',true);
  lbl(W*0.5,H*0.09+24,'ℒ = −¼ F^a_μν F^aμν + ψ̄(iγ^μD_μ − m)ψ','#4ade80',13,'center',true);

  const ox=W*0.36, oy=H*0.52, R=H*0.2;
  const quarks=[
    {sym:'u',col:'#ef4444',label:'Rosso'},
    {sym:'u',col:'#4ade80',label:'Verde'},
    {sym:'d',col:'#3b82f6',label:'Blu'},
  ];

  // color flux tubes between quarks
  quarks.forEach((q,i)=>{
    const a0=(i/3)*Math.PI*2+T*0.15;
    const x0=ox+R*Math.cos(a0), y0=oy+R*Math.sin(a0);
    quarks.forEach((q2,j)=>{
      if(j<=i)return;
      const a1=(j/3)*Math.PI*2+T*0.15;
      const x1=ox+R*Math.cos(a1), y1=oy+R*Math.sin(a1);
      const grad=cx.createLinearGradient(x0,y0,x1,y1);
      grad.addColorStop(0,q.col+'88');
      grad.addColorStop(1,q2.col+'88');
      cx.beginPath();cx.moveTo(x0,y0);cx.lineTo(x1,y1);
      cx.strokeStyle=grad;cx.lineWidth=7;cx.stroke();
    });
  });

  // gluons (wavy lines)
  quarks.forEach((q,i)=>{
    const a0=(i/3)*Math.PI*2+T*0.15;
    const x0=ox+R*Math.cos(a0), y0=oy+R*Math.sin(a0);
    quarks.forEach((q2,j)=>{
      if(j<=i)return;
      const a1=(j/3)*Math.PI*2+T*0.15;
      const x1=ox+R*Math.cos(a1), y1=oy+R*Math.sin(a1);
      cx.beginPath();
      const steps=30;
      for(let k=0;k<=steps;k++){
        const f=k/steps;
        const mx=(x0+(x1-x0)*f), my2=(y0+(y1-y0)*f);
        const perp={x:-(y1-y0),y:(x1-x0)};
        const len=Math.sqrt(perp.x*perp.x+perp.y*perp.y);
        const nx=perp.x/len, ny=perp.y/len;
        const wave=Math.sin(f*Math.PI*5-T*4)*6;
        const px2=mx+nx*wave, py2=my2+ny*wave;
        k===0?cx.moveTo(px2,py2):cx.lineTo(px2,py2);
      }
      cx.strokeStyle='rgba(253,230,138,0.7)';cx.lineWidth=1.5;glow('#fde68a',6);cx.stroke();ng();
    });
  });

  // quark circles
  quarks.forEach((q,i)=>{
    const a=(i/3)*Math.PI*2+T*0.15;
    const qx=ox+R*Math.cos(a), qy=oy+R*Math.sin(a);
    cx.beginPath();cx.arc(qx,qy,22,0,Math.PI*2);
    const qg=cx.createRadialGradient(qx-6,qy-6,3,qx,qy,22);
    qg.addColorStop(0,'#fff');qg.addColorStop(0.4,q.col);qg.addColorStop(1,q.col+'44');
    cx.fillStyle=qg;glow(q.col,20);cx.fill();ng();
    lbl(qx,qy+5,q.sym,'#fff',14,'center',true);
    lbl(qx,qy+24,q.label,q.col,8,'center');
  });

  // proton circle
  cx.beginPath();cx.arc(ox,oy,R+30,0,Math.PI*2);
  cx.strokeStyle='rgba(148,163,184,0.2)';cx.lineWidth=2;cx.setLineDash([8,6]);cx.stroke();cx.setLineDash([]);
  lbl(ox,oy+R+46,'Protone (uud)','#94a3b8',11,'center',true);

  // pion on right
  const px2=W*0.72, py2=oy;
  cx.beginPath();cx.arc(px2,py2,16,0,Math.PI*2);
  cx.strokeStyle='rgba(148,163,184,0.3)';cx.lineWidth=1.5;cx.setLineDash([5,5]);cx.stroke();cx.setLineDash([]);
  cx.beginPath();cx.arc(px2-10,py2,10,0,Math.PI*2);
  const ug=cx.createRadialGradient(px2-12,py2-3,2,px2-10,py2,10);
  ug.addColorStop(0,'#fff');ug.addColorStop(1,'#ef4444');
  cx.fillStyle=ug;glow('#ef4444',12);cx.fill();ng();
  lbl(px2-10,py2+4,'u','#fff',10,'center',true);
  cx.beginPath();cx.arc(px2+10,py2,10,0,Math.PI*2);
  const ubg=cx.createRadialGradient(px2+8,py2-3,2,px2+10,py2,10);
  ubg.addColorStop(0,'#fff');ubg.addColorStop(1,'#60a5fa');
  cx.fillStyle=ubg;glow('#60a5fa',12);cx.fill();ng();
  lbl(px2+10,py2+4,'ū','#fff',10,'center',true);
  cx.beginPath();cx.moveTo(px2-0,py2);cx.lineTo(px2+0,py2);
  const lineGrad=cx.createLinearGradient(px2-10,py2,px2+10,py2);
  lineGrad.addColorStop(0,'#ef4444');lineGrad.addColorStop(1,'#60a5fa');
  cx.strokeStyle=lineGrad;cx.lineWidth=3;cx.stroke();
  lbl(px2,py2+32,'Pione π⁺ (uū)','#94a3b8',10,'center');

  // confinement label
  cx.fillStyle='rgba(8,14,30,0.88)';
  cx.beginPath();cx.roundRect(W*0.6,H*0.15,W*0.32,60,8);cx.fill();
  cx.strokeStyle='#ef4444';cx.lineWidth=1;cx.stroke();
  lbl(W*0.6+W*0.16,H*0.15+18,'Confinamento','#ef4444',13,'center',true);
  lbl(W*0.6+W*0.16,H*0.15+34,'I quark non possono','#94a3b8',10,'center');
  lbl(W*0.6+W*0.16,H*0.15+48,'esistere isolati','#94a3b8',10,'center');

  lbl(W*0.5,H*0.91,'I quark non possono esistere da soli — il confinamento è uno dei misteri della QCD','#94a3b8',11,'center');
}

// ── FASE 7: Entanglement ──────────────────────────────────
let _measured=false, _flash7=0;
function ph7(){
  if(pT===1){_measured=false;_flash7=0;}

  lbl(W*0.5,H*0.09,'L\'Entanglement Quantistico','#f1f5f9',20,'center',true);
  lbl(W*0.5,H*0.09+24,'|Φ⁺⟩ = (|↑↑⟩ + |↓↓⟩)/√2  —  stato di Bell','#c4b5fd',13,'center',true);

  const cx0=W*0.5, cy0=H*0.5;
  const sep=Math.min(pT*0.5,W*0.32);

  if(pT>300&&!_measured){_measured=true;_flash7=25;}
  if(_flash7>0){
    cx.fillStyle=`rgba(196,181,253,${_flash7/25*0.3})`;
    cx.fillRect(0,0,W,H);
    _flash7--;
  }

  const lx=cx0-sep, rx=cx0+sep;

  // quantum thread
  if(!_measured){
    const threadAlpha=0.5+0.3*Math.sin(T*2);
    cx.beginPath();cx.moveTo(lx,cy0);cx.lineTo(rx,cy0);
    cx.strokeStyle=`rgba(196,181,253,${threadAlpha})`;cx.lineWidth=2;
    glow('#c4b5fd',10);cx.stroke();ng();
    // thread oscillation
    cx.beginPath();
    for(let k=0;k<=80;k++){
      const f=k/80;
      const x=lx+(rx-lx)*f;
      const wave=10*Math.sin(f*Math.PI*4+T*3)*Math.sin(f*Math.PI);
      k===0?cx.moveTo(x,cy0+wave):cx.lineTo(x,cy0+wave);
    }
    cx.strokeStyle=`rgba(196,181,253,${threadAlpha*0.5})`;cx.lineWidth=1;glow('#c4b5fd',6);cx.stroke();ng();
  }

  // particle 1 (left)
  cx.beginPath();cx.arc(lx,cy0,22,0,Math.PI*2);
  const pg1=cx.createRadialGradient(lx-6,cy0-6,4,lx,cy0,22);
  pg1.addColorStop(0,'#e9d5ff');pg1.addColorStop(1,'#7c3aed');
  cx.fillStyle=pg1;glow('#c4b5fd',18);cx.fill();ng();
  if(_measured){
    lbl(lx,cy0-36,'↑','#60a5fa',28,'center',true);
    lbl(lx,cy0+42,'spin su','#60a5fa',10,'center');
  } else {
    lbl(lx,cy0+5,'?','#c4b5fd',16,'center',true);
    lbl(lx,cy0+38,'sovrapposizione','#64748b',9,'center');
  }

  // particle 2 (right)
  cx.beginPath();cx.arc(rx,cy0,22,0,Math.PI*2);
  const pg2=cx.createRadialGradient(rx-6,cy0-6,4,rx,cy0,22);
  pg2.addColorStop(0,'#fecdd3');pg2.addColorStop(1,'#9f1239');
  cx.fillStyle=pg2;glow('#f43f5e',18);cx.fill();ng();
  if(_measured){
    lbl(rx,cy0-36,'↓','#f97316',28,'center',true);
    lbl(rx,cy0+42,'spin giù','#f97316',10,'center');
  } else {
    lbl(rx,cy0+5,'?','#c4b5fd',16,'center',true);
    lbl(rx,cy0+38,'sovrapposizione','#64748b',9,'center');
  }

  // source
  cx.beginPath();cx.arc(cx0,cy0,8+3*Math.sin(T*2),0,Math.PI*2);
  cx.fillStyle='#c4b5fd';glow('#c4b5fd',20);cx.fill();ng();
  lbl(cx0,cy0+24,'sorgente','#64748b',8,'center');

  // EPR box
  cx.fillStyle='rgba(8,14,30,0.88)';
  cx.beginPath();cx.roundRect(W*0.5-180,H*0.76,360,70,8);cx.fill();
  cx.strokeStyle='#c4b5fd';cx.lineWidth=1;cx.stroke();
  lbl(W*0.5,H*0.76+18,'Disuguaglianza di Bell: |E(a,b)−E(a,b\')|+|E(a\',b)+E(a\',b\')| ≤ 2','#c4b5fd',10,'center');
  lbl(W*0.5,H*0.76+34,'La Meccanica Quantistica viola questo limite (≤ 2√2)','#94a3b8',10,'center');
  lbl(W*0.5,H*0.76+52,'"Azione fantasma a distanza" — Einstein aveva torto','#f59e0b',10,'center',true);

  if(_measured){
    lbl(W*0.5,H*0.3,'MISURAZIONE — correlazione istantanea!','#c4b5fd',14,'center',true);
  }
  lbl(W*0.5,H*0.91,'Einstein lo chiamò "azione fantasma a distanza" — ma la natura aveva ragione','#94a3b8',11,'center');
}

// ── FASE 8: QED — Feynman Diagrams ───────────────────────
function ph8(){
  lbl(W*0.5,H*0.09,'L\'Elettrodinamica Quantistica — QED','#f1f5f9',20,'center',true);
  lbl(W*0.5,H*0.09+24,'α = e²/4πε₀ℏc ≈ 1/137  —  costante di struttura fine','#4ade80',13,'center',true);

  // Diagram 1: electron-electron scattering
  const d1x=W*0.26, d1y=H*0.52;
  const prog1=Math.min(1,pT/120);

  lbl(d1x,H*0.2,'e⁻ — e⁻ scattering','#60a5fa',12,'center',true);

  // incoming electrons
  drawFermionLine(W*0.08,d1y-H*0.18,d1x,d1y-H*0.07,'#60a5fa',prog1,true);
  drawFermionLine(W*0.08,d1y+H*0.18,d1x,d1y+H*0.07,'#60a5fa',prog1,true);
  // outgoing electrons
  drawFermionLine(d1x,d1y-H*0.07,W*0.44,d1y-H*0.18,'#60a5fa',prog1,true);
  drawFermionLine(d1x,d1y+H*0.07,W*0.44,d1y+H*0.18,'#60a5fa',prog1,true);
  // virtual photon
  if(prog1>0.5) drawPhotonWavy(d1x,d1y-H*0.07,d1x,d1y+H*0.07,'#fde68a',(prog1-0.5)*2);

  // vertex dots
  if(prog1>0.5){
    cx.beginPath();cx.arc(d1x,d1y-H*0.07,5,0,Math.PI*2);cx.fillStyle='#fde68a';glow('#fde68a',10);cx.fill();ng();
    cx.beginPath();cx.arc(d1x,d1y+H*0.07,5,0,Math.PI*2);cx.fillStyle='#fde68a';glow('#fde68a',10);cx.fill();ng();
    lbl(d1x+14,d1y+4,'γ virtuale','#fde68a',9,'left');
  }
  lbl(W*0.08,d1y-H*0.21,'e⁻','#60a5fa',11,'center');
  lbl(W*0.08,d1y+H*0.21,'e⁻','#60a5fa',11,'center');
  lbl(W*0.44,d1y-H*0.21,'e⁻','#60a5fa',11,'center');
  lbl(W*0.44,d1y+H*0.21,'e⁻','#60a5fa',11,'center');

  // Diagram 2: pair production
  const d2x=W*0.73, d2y=H*0.52;
  const prog2=Math.min(1,Math.max(0,(pT-150)/120));

  lbl(d2x,H*0.2,'Produzione di coppia','#4ade80',12,'center',true);
  // incoming photon
  if(prog2>0) drawPhotonWavy(W*0.57,d2y,d2x,d2y,'#fde68a',prog2);
  // outgoing e- and e+
  if(prog2>0.5){
    drawFermionLine(d2x,d2y,W*0.88,d2y-H*0.16,'#60a5fa',(prog2-0.5)*2,true);
    drawFermionLine(d2x,d2y,W*0.88,d2y+H*0.16,'#f97316',(prog2-0.5)*2,false);
    cx.beginPath();cx.arc(d2x,d2y,5,0,Math.PI*2);cx.fillStyle='#fde68a';glow('#fde68a',10);cx.fill();ng();
    lbl(W*0.88,d2y-H*0.18,'e⁻','#60a5fa',11,'center');
    lbl(W*0.88,d2y+H*0.18,'e⁺','#f97316',11,'center');
    lbl(d2x+10,d2y-16,'vertice','#fde68a',8,'left');
  }
  lbl(W*0.57,d2y+H*0.04,'γ','#fde68a',13,'left');

  // alpha box
  cx.fillStyle='rgba(8,14,30,0.9)';
  cx.beginPath();cx.roundRect(W*0.5-200,H*0.78,400,56,8);cx.fill();
  cx.strokeStyle='#4ade80';cx.lineWidth=1;cx.stroke();
  lbl(W*0.5,H*0.78+18,'α ≈ 1/137.036  —  costante di struttura fine','#4ade80',12,'center',true);
  lbl(W*0.5,H*0.78+34,'"La QED è la teoria più precisa mai sviluppata — accordo a 12 cifre"','#94a3b8',10,'center');
  lbl(W*0.5,H*0.78+50,'"La natura non si preoccupa di quello che troviamo difficile" — Feynman','#64748b',9,'center');
}

function drawFermionLine(x0,y0,x1,y1,col,prog,arrow){
  const ex=x0+(x1-x0)*prog, ey=y0+(y1-y0)*prog;
  cx.beginPath();cx.moveTo(x0,y0);cx.lineTo(ex,ey);
  cx.strokeStyle=col;cx.lineWidth=2;glow(col,8);cx.stroke();ng();
  if(arrow&&prog>=1){
    const ang=Math.atan2(y1-y0,x1-x0);
    cx.beginPath();
    cx.moveTo(ex,ey);
    cx.lineTo(ex-10*Math.cos(ang-0.4),ey-10*Math.sin(ang-0.4));
    cx.lineTo(ex-10*Math.cos(ang+0.4),ey-10*Math.sin(ang+0.4));
    cx.closePath();cx.fillStyle=col;cx.fill();
  }
}

function drawPhotonWavy(x0,y0,x1,y1,col,prog){
  const ex=x0+(x1-x0)*prog, ey=y0+(y1-y0)*prog;
  cx.beginPath();
  const dx=ex-x0,dy=ey-y0;
  const len=Math.sqrt(dx*dx+dy*dy);
  const steps=Math.max(2,Math.floor(len/6));
  for(let k=0;k<=steps;k++){
    const f=k/steps;
    const mx=x0+dx*f, my=y0+dy*f;
    const perp={x:-dy/len,y:dx/len};
    const wave=Math.sin(f*Math.PI*8)*7;
    const px2=mx+perp.x*wave, py2=my+perp.y*wave;
    k===0?cx.moveTo(px2,py2):cx.lineTo(px2,py2);
  }
  cx.strokeStyle=col;cx.lineWidth=2;glow(col,10);cx.stroke();ng();
}

// ── FASE 9: Bosone di Higgs ───────────────────────────────
function ph9(){
  lbl(W*0.5,H*0.09,'Il Bosone di Higgs','#f1f5f9',20,'center',true);
  lbl(W*0.5,H*0.09+24,'Scoperta al CERN — LHC — 4 luglio 2012 — mH = 125.09 GeV','#fde68a',13,'center',true);

  // Higgs field grid
  const cols=18,rows=10;
  const gx0=W*0.07, gy0=H*0.22, gW=W*0.56, gH=H*0.42;
  for(let r=0;r<rows;r++){
    for(let c=0;c<cols;c++){
      const x=gx0+c*(gW/cols)+gW/(cols*2);
      const y=gy0+r*(gH/rows)+gH/(rows*2);
      const osc=Math.sin(T*1.5+c*0.5+r*0.7)*0.4+0.6;
      const rad=3+osc*3;
      cx.beginPath();cx.arc(x,y,rad,0,Math.PI*2);
      cx.fillStyle=`rgba(253,230,138,${0.3+osc*0.4})`;
      glow('#fde68a',osc*12);cx.fill();ng();
    }
  }
  lbl(gx0+gW/2,gy0-14,'Campo di Higgs — permea tutto lo spazio','#fde68a',11,'center');

  // particles moving through
  const photX=(T*60)%(W*0.7);
  const wX=((T*30+W*0.35))%(W*0.7);
  // photon (fast, straight)
  cx.beginPath();cx.arc(gx0+photX%gW,gy0+gH*0.25,6,0,Math.PI*2);
  cx.fillStyle='#fff';glow('#fff',14);cx.fill();ng();
  lbl(gx0+(photX%gW),gy0+gH*0.25-16,'γ','#fde68a',11,'center',true);
  // W boson (slow, wobbly)
  const wx2=gx0+wX%gW, wy2=gy0+gH*0.72+Math.sin(T*4)*10;
  cx.beginPath();cx.arc(wx2,wy2,9,0,Math.PI*2);
  cx.fillStyle='#4ade80';glow('#4ade80',14);cx.fill();ng();
  lbl(wx2,wy2-18,'W±','#4ade80',10,'center',true);

  lbl(gx0+gW*0.2,gy0+gH*0.25+16,'fotone: no interazione','#64748b',9,'center');
  lbl(gx0+gW*0.7,gy0+gH*0.72+28,'W: interazione forte → massa','#64748b',9,'center');

  // Mexican hat potential (right side)
  const hx=W*0.77, hy=H*0.5, hR=W*0.1, hH=H*0.3;
  lbl(hx,H*0.2,'Potenziale Higgs','#fde68a',11,'center',true);
  lbl(hx,H*0.22+12,'"Cappello messicano"','#64748b',9,'center');
  // draw hat cross-section
  cx.beginPath();
  for(let k=0;k<=100;k++){
    const phi=-2+4*(k/100);
    const V=0.3*(phi*phi-1)*(phi*phi-1);
    const px2=hx+phi*hR*1.1;
    const py2=hy-V*hH*1.8;
    k===0?cx.moveTo(px2,py2):cx.lineTo(px2,py2);
  }
  cx.strokeStyle='#fde68a';cx.lineWidth=2;glow('#fde68a',8);cx.stroke();ng();
  // minimum marker
  const minPhi=1, minV=0;
  cx.beginPath();cx.arc(hx+minPhi*hR*1.1,hy,5,0,Math.PI*2);
  cx.fillStyle='#fde68a';glow('#fde68a',12);cx.fill();ng();
  lbl(hx+minPhi*hR*1.1+8,hy,'v','#fde68a',10,'left');
  cx.beginPath();cx.arc(hx-minPhi*hR*1.1,hy,5,0,Math.PI*2);
  cx.fillStyle='#fde68a';cx.fill();
  lbl(hx,H*0.75,'V(φ) = −μ²φ² + λφ⁴','#fde68a',9,'center');
  lbl(hx,H*0.75+14,'rottura spontanea SU(2)×U(1)→U(1)_EM','#64748b',8,'center');

  // resonance peak
  const rx2=W*0.07, ry2=H*0.74, rW=W*0.56, rH=H*0.14;
  cx.fillStyle='rgba(8,14,30,0.8)';
  cx.beginPath();cx.roundRect(rx2,ry2,rW,rH+20,6);cx.fill();
  cx.strokeStyle='#1e3a5f';cx.lineWidth=1;cx.stroke();
  lbl(rx2+rW/2,ry2+14,'Segnale LHC — H → γγ (m = 125 GeV)','#fde68a',10,'center',true);
  cx.beginPath();
  for(let k=0;k<=200;k++){
    const mass=100+k*0.5;
    const bkg=0.4*Math.exp(-0.02*(mass-100));
    const sig=0.8*Math.exp(-Math.pow(mass-125,2)/8)*(1+0.05*Math.sin(T*3));
    const val=(bkg+sig);
    const px2=rx2+10+(mass-100)/(100)*( rW-20);
    const py2=ry2+rH+8-val*rH*0.85;
    k===0?cx.moveTo(px2,py2):cx.lineTo(px2,py2);
  }
  cx.strokeStyle='#fde68a';cx.lineWidth=2;glow('#fde68a',6);cx.stroke();ng();
  // peak label
  cx.beginPath();cx.moveTo(rx2+10+(125-100)/100*(rW-20),ry2+14);
  cx.lineTo(rx2+10+(125-100)/100*(rW-20),ry2+rH+8-0.8*rH*0.85);
  cx.strokeStyle='rgba(253,230,138,0.5)';cx.lineWidth=1;cx.setLineDash([3,3]);cx.stroke();cx.setLineDash([]);
  lbl(rx2+10+(125-100)/100*(rW-20),ry2+10,'125 GeV','#fde68a',8,'center');

  lbl(W*0.5,H*0.91,'Il bosone di Higgs è l\'ultima particella del Modello Standard — scoperto nel 2012','#94a3b8',11,'center');
}

// ── MAIN LOOP ─────────────────────────────────────────────
function draw(){
  cx.clearRect(0,0,W,H); bg(); stars();
  switch(ph){
    case 0:ph0();break; case 1:ph1();break; case 2:ph2();break;
    case 3:ph3();break; case 4:ph4();break; case 5:ph5();break;
    case 6:ph6();break; case 7:ph7();break; case 8:ph8();break;
    case 9:ph9();break;
  }
  if(!paused){
    T+=0.022; pT++;
    if(pT>520&&ph<9) go(ph+1);
  }
  requestAnimationFrame(draw);
}

go(0); draw();
</script>
